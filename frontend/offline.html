<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Hospital Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d6efd;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .offline-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 3rem;
            text-align: center;
            max-width: 450px;
            margin: 1rem;
        }

        .offline-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
        }

        .offline-icon i {
            font-size: 3rem;
            color: white;
        }

        h1 {
            color: #333;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
        }

        .btn-retry {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .tips {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
            text-align: left;
        }

        .tips h6 {
            color: #333;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .tips ul {
            color: #666;
            padding-left: 1.5rem;
        }

        .tips li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">
            <i class="bi bi-wifi-off"></i>
        </div>

        <h1>You're Offline</h1>
        <p>It seems you've lost your internet connection. Please check your connection and try again.</p>

        <button class="btn btn-retry" onclick="window.location.reload()">
            <i class="bi bi-arrow-clockwise me-2"></i>
            Try Again
        </button>

        <div class="tips">
            <h6><i class="bi bi-lightbulb me-2"></i>What you can do:</h6>
            <ul>
                <li>Check if your WiFi or mobile data is turned on</li>
                <li>Move to an area with better signal</li>
                <li>Try restarting your router</li>
                <li>Check if other apps can connect to the internet</li>
            </ul>
        </div>
    </div>

    <script>
        // Automatically check for connection and redirect
        function checkConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            }
        }

        // Check connection status periodically
        setInterval(checkConnection, 5000);

        // Also check when online event fires
        window.addEventListener('online', checkConnection);
    </script>
</body>
</html>
