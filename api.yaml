openapi: 3.0.3
info:
  title: Hospital Management System API
  description: REST API for managing hospital appointments, patients, doctors, and administrative tasks.
  version: 1.0.0
  contact:
    email: support@hms.example.com

servers:
  - url: http://localhost:5000/api
    description: Development server

tags:
  - name: Authentication
    description: User registration and login
  - name: Patient
    description: Patient operations
  - name: Doctor
    description: Doctor operations
  - name: Admin
    description: Administrative operations
  - name: Payment
    description: Payment processing
  - name: Reports
    description: Report generation

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
                - role
              properties:
                username:
                  type: string
                  example: johndoe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  example: securepassword123
                role:
                  type: string
                  enum: [patient, doctor]
                  example: patient
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error

  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  format: password
                  example: securepassword123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /patient/profile:
    get:
      tags:
        - Patient
      summary: Get patient profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Patient profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
    put:
      tags:
        - Patient
      summary: Update patient profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientUpdate'
      responses:
        '200':
          description: Profile updated successfully

  /patient/departments:
    get:
      tags:
        - Patient
      summary: List all departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'

  /patient/doctors:
    get:
      tags:
        - Patient
      summary: Search and list doctors
      security:
        - bearerAuth: []
      parameters:
        - name: department_id
          in: query
          schema:
            type: integer
        - name: specialization
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Doctor'

  /patient/appointments:
    get:
      tags:
        - Patient
      summary: List patient appointments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled]
      responses:
        '200':
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'
    post:
      tags:
        - Patient
      summary: Book new appointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - doctor_id
                - date
                - time_slot
              properties:
                doctor_id:
                  type: integer
                  example: 1
                department_id:
                  type: integer
                  example: 1
                date:
                  type: string
                  format: date
                  example: "2024-12-15"
                time_slot:
                  type: string
                  example: "10:00"
                reason:
                  type: string
                  example: "Regular checkup"
      responses:
        '201':
          description: Appointment booked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'

  /patient/appointments/{id}:
    get:
      tags:
        - Patient
      summary: Get appointment details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Appointment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
    put:
      tags:
        - Patient
      summary: Update or cancel appointment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [cancelled]
      responses:
        '200':
          description: Appointment updated

  /patient/treatments:
    get:
      tags:
        - Patient
      summary: Get treatment history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of treatments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Treatment'

  /patient/history:
    get:
      tags:
        - Patient
      summary: Get medical history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Medical history data

  /doctor/profile:
    get:
      tags:
        - Doctor
      summary: Get doctor profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Doctor profile data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
    put:
      tags:
        - Doctor
      summary: Update doctor profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorUpdate'
      responses:
        '200':
          description: Profile updated

  /doctor/appointments:
    get:
      tags:
        - Doctor
      summary: List doctor appointments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

  /doctor/appointments/{id}:
    put:
      tags:
        - Doctor
      summary: Update appointment status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [confirmed, completed, cancelled]
                notes:
                  type: string
      responses:
        '200':
          description: Appointment updated

  /doctor/patients:
    get:
      tags:
        - Doctor
      summary: List doctor patients
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'

  /doctor/availability:
    get:
      tags:
        - Doctor
      summary: Get availability slots
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Availability slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Availability'
    post:
      tags:
        - Doctor
      summary: Set availability slot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailabilityCreate'
      responses:
        '201':
          description: Availability created

  /doctor/treatments:
    post:
      tags:
        - Doctor
      summary: Create treatment record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TreatmentCreate'
      responses:
        '201':
          description: Treatment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Treatment'

  /doctor/dashboard/stats:
    get:
      tags:
        - Doctor
      summary: Get dashboard statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_patients:
                    type: integer
                  today_appointments:
                    type: integer
                  pending_appointments:
                    type: integer
                  completed_appointments:
                    type: integer

  /admin/doctors:
    get:
      tags:
        - Admin
      summary: List all doctors
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Doctor'
    post:
      tags:
        - Admin
      summary: Create new doctor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorCreate'
      responses:
        '201':
          description: Doctor created

  /admin/doctors/{id}:
    get:
      tags:
        - Admin
      summary: Get doctor details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Doctor details
    put:
      tags:
        - Admin
      summary: Update doctor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorUpdate'
      responses:
        '200':
          description: Doctor updated

  /admin/patients:
    get:
      tags:
        - Admin
      summary: List all patients
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'

  /admin/appointments:
    get:
      tags:
        - Admin
      summary: List all appointments
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of appointments

  /admin/departments:
    get:
      tags:
        - Admin
      summary: List all departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of departments
    post:
      tags:
        - Admin
      summary: Create department
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Department created

  /admin/dashboard/stats:
    get:
      tags:
        - Admin
      summary: Get admin dashboard statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_doctors:
                    type: integer
                  total_patients:
                    type: integer
                  total_appointments:
                    type: integer
                  total_revenue:
                    type: number

  /admin/payments:
    get:
      tags:
        - Admin
      summary: List all payments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of payments

  /payment/initiate:
    post:
      tags:
        - Payment
      summary: Initiate payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - appointment_id
              properties:
                appointment_id:
                  type: integer
                payment_method:
                  type: string
                  enum: [card, cash, insurance]
      responses:
        '200':
          description: Payment initiated

  /payment/process:
    post:
      tags:
        - Payment
      summary: Process payment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - payment_id
              properties:
                payment_id:
                  type: integer
                card_number:
                  type: string
                expiry:
                  type: string
                cvv:
                  type: string
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'

  /payment/history:
    get:
      tags:
        - Payment
      summary: Get payment history
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payment history

  /reports/medical-record:
    get:
      tags:
        - Reports
      summary: Generate medical record PDF
      security:
        - bearerAuth: []
      parameters:
        - name: patient_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Medical record HTML for PDF generation
          content:
            text/html:
              schema:
                type: string

  /reports/export/csv:
    post:
      tags:
        - Reports
      summary: Export patient history as CSV
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                patient_id:
                  type: integer
      responses:
        '202':
          description: Export job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  message:
                    type: string

  /reports/export/status/{task_id}:
    get:
      tags:
        - Reports
      summary: Check export status
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Export status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  result:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Patient:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        date_of_birth:
          type: string
          format: date
        gender:
          type: string
        phone:
          type: string
        address:
          type: string
        blood_group:
          type: string
        emergency_contact:
          type: string

    PatientUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        address:
          type: string
        blood_group:
          type: string
        emergency_contact:
          type: string

    Doctor:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        department_id:
          type: integer
        first_name:
          type: string
        last_name:
          type: string
        specialization:
          type: string
        qualification:
          type: string
        experience_years:
          type: integer
        consultation_fee:
          type: number
        phone:
          type: string
        is_active:
          type: boolean
        department:
          $ref: '#/components/schemas/Department'

    DoctorCreate:
      type: object
      required:
        - username
        - email
        - password
        - first_name
        - last_name
        - department_id
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        department_id:
          type: integer
        specialization:
          type: string
        qualification:
          type: string
        experience_years:
          type: integer
        consultation_fee:
          type: number

    DoctorUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        specialization:
          type: string
        qualification:
          type: string
        experience_years:
          type: integer
        consultation_fee:
          type: number
        phone:
          type: string

    Department:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        doctors_count:
          type: integer

    Appointment:
      type: object
      properties:
        id:
          type: integer
        patient_id:
          type: integer
        doctor_id:
          type: integer
        department_id:
          type: integer
        date:
          type: string
          format: date
        time_slot:
          type: string
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        reason:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        patient:
          $ref: '#/components/schemas/Patient'
        doctor:
          $ref: '#/components/schemas/Doctor'

    Availability:
      type: object
      properties:
        id:
          type: integer
        doctor_id:
          type: integer
        day_of_week:
          type: integer
        start_time:
          type: string
        end_time:
          type: string
        is_available:
          type: boolean

    AvailabilityCreate:
      type: object
      required:
        - day_of_week
        - start_time
        - end_time
      properties:
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "17:00"
        is_available:
          type: boolean
          default: true

    Treatment:
      type: object
      properties:
        id:
          type: integer
        patient_id:
          type: integer
        doctor_id:
          type: integer
        appointment_id:
          type: integer
        diagnosis:
          type: string
        prescription:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time

    TreatmentCreate:
      type: object
      required:
        - patient_id
        - appointment_id
        - diagnosis
      properties:
        patient_id:
          type: integer
        appointment_id:
          type: integer
        diagnosis:
          type: string
        prescription:
          type: string
        notes:
          type: string

    Payment:
      type: object
      properties:
        id:
          type: integer
        appointment_id:
          type: integer
        patient_id:
          type: integer
        amount:
          type: number
        payment_method:
          type: string
          enum: [card, cash, insurance]
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        transaction_id:
          type: string
        created_at:
          type: string
          format: date-time
